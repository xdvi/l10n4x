[package]
name = "l10n4c"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "C-FFI bindings for the l10n4x localization runtime"
documentation = "https://docs.rs/l10n4c"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
l10n4x-core = { path = "../core", default-features = false, features = ["alloc", "integrity", "std", "encryption"] }

[dev-dependencies]
l10n4x-core = { path = "../core", features = ["integrity", "std"] }
l10n4x-compiler = { path = "../compiler" }