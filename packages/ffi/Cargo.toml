[package]
name = "l10n4c"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "C-FFI bindings for the l10n4x localization runtime"
documentation = "https://docs.rs/l10n4c"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
l10n4x-core = { version = "0.3.0", path = "../core", default-features = false, features = ["alloc", "std", "encryption"] }

[dev-dependencies]
l10n4x-core = { version = "0.3.0", path = "../core", features = ["std"] }
l10n4x-compiler = { version = "0.3.0", path = "../compiler" }
bindgen = "0.69"
criterion = "0.5"

[[bench]]
name = "translate"
harness = false