[package]
name = "l10n4x-compiler"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
default = []
debug-keys = ["l10n4x-core/debug-keys"]

[dependencies]
serde_json = "1.0"
l10n4x-core = { version = "0.4.0", path = "../core", default-features = false, features = ["alloc", "std", "encryption"] }
zstd = "0.13"
thiserror = "1.0"
ed25519-dalek = { version = "2.1", default-features = false, features = ["alloc", "std"] }
