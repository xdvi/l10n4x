[package]
name = "l10n4x-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
default = ["std"]
std = ["alloc", "dep:aes-gcm", "aes-gcm?/std", "aes-gcm?/getrandom"]
alloc = ["dep:aes-gcm", "aes-gcm?/alloc"]
encryption = ["dep:aes-gcm"]

[dependencies]
aes-gcm = { version = "0.10.3", optional = true, default-features = false, features = ["aes"] }
miniz_oxide = { version = "0.9", default-features = false, features = ["with-alloc"] }

[dev-dependencies]
serde_json = "1.0"
