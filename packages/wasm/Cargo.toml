[package]
name = "l10n4x-wasm"
version = "1.0.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
name = "l10n4x"
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
l10n4x-core = { version = "1.0.0", path = "../core", features = ["std", "encryption"] }

[target.'cfg(target_family = "wasm")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

# Used by `wasm-pack build --profile release-size` (maps to profile.custom).
[package.metadata.wasm-pack.profile.custom]
wasm-opt = [
  "-Oz",
  "--enable-bulk-memory",
  "--enable-nontrapping-float-to-int",
  "--enable-sign-ext",
]

[package.metadata.wasm-pack.profile.custom.wasm-bindgen]
debug-js-glue = false
demangle-name-section = false
dwarf-debug-info = false
omit-default-module-path = false

[dev-dependencies]
wasmtime = "46"