[package]
name = "l10n4x-toolkit"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[[bin]]
name = "l10n4x"
path = "src/main.rs"

[features]
default = ["plugin-crowdin"]
plugin-crowdin = ["dep:l10n4x-plugin-crowdin"]
debug-keys = ["l10n4x-compiler/debug-keys"]

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
axum = "0.7"
notify = "6"
anyhow = "1"
thiserror = "1"
l10n4x-compiler = { version = "0.2.0", path = "../compiler" }
l10n4x-core = { version = "0.2.0", path = "../core" }
l10n4x-tms = { version = "0.2.0", path = "../tms" }
l10n4x-plugin-crowdin = { version = "0.2.0", path = "../plugins/crowdin", optional = true }
tokio-stream = { version = "0.1", features = ["sync"] }
tower-http = { version = "0.5", features = ["cors", "timeout"] } # For browser cross-origin dev server requests
subtle = "2.5"
base64 = { version = "0.22", default-features = false, features = ["alloc"] }
regex-lite = "0.1"
glob = { version = "0.3", default-features = false }
ureq = { version = "2.10", default-features = false, features = ["tls"] }
sha2 = "0.10"

[dev-dependencies]
tempfile = "3"
