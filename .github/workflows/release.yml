name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-assets:
    name: Build assets for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bin_name: l10n4x
          - os: macos-latest
            bin_name: l10n4x
          - os: windows-latest
            bin_name: l10n4x.exe

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # master
        with:
          toolchain: stable

      - name: Build target
        run: cargo build --release -p l10n4x-toolkit -p l10n4c

      - name: Package assets (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist-assets bundle
          cp target/release/l10n4x bundle/l10n4x
          cp target/release/libl10n4c.so bundle/libl10n4c.so
          cp packages/ffi/l10n4c.h bundle/l10n4c.h
          cp target/release/libl10n4c.a bundle/libl10n4c.a
          tar czf dist-assets/l10n4x-linux-amd64.tar.gz -C bundle .
          cp target/release/l10n4x dist-assets/l10n4x-linux
          cp target/release/libl10n4c.so dist-assets/libl10n4c-linux.so
          cp target/release/libl10n4c.a dist-assets/libl10n4c-linux.a

      - name: Package assets (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist-assets bundle
          cp target/release/l10n4x bundle/l10n4x
          cp target/release/libl10n4c.dylib bundle/libl10n4c.dylib
          cp packages/ffi/l10n4c.h bundle/l10n4c.h
          cp target/release/libl10n4c.a bundle/libl10n4c.a
          tar czf dist-assets/l10n4x-macos-universal.tar.gz -C bundle .
          cp target/release/l10n4x dist-assets/l10n4x-macos
          cp target/release/libl10n4c.dylib dist-assets/libl10n4c-macos.dylib
          cp target/release/libl10n4c.a dist-assets/libl10n4c-macos.a

      - name: Package assets (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist-assets bundle
          cp target/release/l10n4x.exe bundle/l10n4x.exe
          cp target/release/l10n4c.dll bundle/l10n4c.dll
          cp packages/ffi/l10n4c.h bundle/l10n4c.h
          cp target/release/l10n4c.lib bundle/l10n4c.lib
          powershell -Command "Compress-Archive -Path bundle/* -DestinationPath dist-assets/l10n4x-windows-amd64.zip"
          cp target/release/l10n4x.exe dist-assets/l10n4x-windows.exe
          cp target/release/l10n4c.dll dist-assets/l10n4c-windows.dll
          cp target/release/l10n4c.lib dist-assets/l10n4c-windows.lib

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: assets-${{ matrix.os }}
          path: dist-assets/*

  build-wasm:
    name: Build WASM asset
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --profile release-size -p l10n4x-wasm

      - name: Prepare WASM asset
        run: |
          mkdir -p dist-wasm
          cp target/wasm32-unknown-unknown/release-size/l10n4x.wasm dist-wasm/l10n4x.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: assets-wasm
          path: dist-wasm/*

  publish-release:
    name: Create GitHub Release
    needs: [build-assets, build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Flatten artifacts structure
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists. Skipping creation."
          else
            gh release create ${{ github.ref_name }} release-assets/* \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi
