name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [ checks_requested ]

permissions:
  contents: read

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          shared-key: bench-criterion
      - name: Save baseline on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cargo bench -p l10n4x-core --bench lookup -- --save-baseline main
      - name: Compare against baseline on PR
        if: github.event_name == 'pull_request'
        run: |
          cargo bench -p l10n4x-core --bench lookup -- --save-baseline main || true
          chmod +x scripts/check_bench_regression.sh
          ./scripts/check_bench_regression.sh 5 main || {
            echo "::warning::Bench regression script failed; run 'cargo bench -p l10n4x-core --bench lookup -- --save-baseline main' on main to refresh baseline."
            exit 0
          }
      - name: Run full workspace benches (report only)
        run: cargo bench --workspace --no-run && cargo bench -p l10n4x-core --bench lookup 2>&1 | tail -30
