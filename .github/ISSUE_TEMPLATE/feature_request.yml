name: Feature Request
description: Propose a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Motivation
      description: What problem does this solve? Why is it valuable?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed Solution
      description: What would the feature look like? Include API sketches or examples if relevant.
      placeholder: |
        ```rust
        // Example API usage
        l10n4x::load_from_url("https://cdn.example.com/en_US.lpk")?;
        ```
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives Considered
      description: What other approaches did you think about? Why aren't they suitable?
  - type: dropdown
    attributes:
      label: Affected Component
      options:
        - l10n4x-core (runtime)
        - l10n4x-compiler (build)
        - l10n4x-toolkit (CLI)
        - l10n4c (C FFI)
        - l10n4x-wasm
        - Plugin (Crowdin)
        - Cross-cutting
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Breaking Change?
      options:
        - label: This feature requires a breaking API change
