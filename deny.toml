# Configuration for cargo-deny

[advisories]
version = 2
vulnerability = "deny"
unmaintained = "deny"
unsound = "deny"
yanked = "warn"

[licenses]
version = 2
private = { ignore = true }
# We allow standard open-source licenses
allow = [
    "MIT",
    "Apache-2.0",
    "0BSD",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Zlib",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "deny"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
